name: Build and Push to GHCR

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-app
  IMAGE_NGINX: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-nginx

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for app
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_APP }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Extract metadata (tags, labels) for nginx
        id: meta_nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NGINX }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: app
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: nginx
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta_nginx.outputs.tags }}
          labels: ${{ steps.meta_nginx.outputs.labels }}

