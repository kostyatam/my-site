load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;
load_module modules/ngx_http_zstd_filter_module.so;
load_module modules/ngx_http_zstd_static_module.so;

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;

  # Proxy compression (HTML / JSON / etc) for dynamic responses
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 256;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;

  brotli on;                 # compress proxied responses
  brotli_comp_level 5;
  brotli_types text/plain text/css application/javascript application/json application/xml+rss image/svg+xml application/xml text/xml application/x-font-ttf font/opentype;

  zstd on;                   # compress proxied responses
  zstd_comp_level 7;
  zstd_min_length 256;
  zstd_types text/plain text/html text/css application/json application/javascript image/svg+xml;

  # Cache headers for static
  map $sent_http_content_type $static_cache {
    default                                "public, max-age=31536000, immutable";
  }

  upstream app {
    server app:3000;
    keepalive 64;
  }

  server {
    listen 80;
    server_name _;

    # Serve Next.js static assets directly, prefer precompressed .br/.zst
    # Note the ^~ to beat regex locations that might match .js/.css
    location ^~ /_next/static/ {
      root /usr/share/nginx/html;
      access_log off;

      # Serve precompressed files from disk when present
      gzip_static  on;     # foo.js.gz
      brotli_static on;    # foo.js.br
      zstd_static  on;     # foo.js.zst

      # Long cache for build-hashed assets
      expires 1y;
      add_header Cache-Control $static_cache always;
      try_files $uri =404;
    }

    # Public folder (optional)
    location ^~ /public/ {
      root /usr/share/nginx/html;
      access_log off;

      gzip_static  on;
      brotli_static on;
      zstd_static  on;

      expires 30d;
      add_header Cache-Control "public, max-age=2592000" always;
      try_files $uri =404;
    }

    # Everything else -> Next server (SSR / API)
    location / {
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_read_timeout 60s;

      proxy_pass http://app;

      # security-ish headers (tune to your needs)
      add_header X-Content-Type-Options nosniff always;
      add_header Referrer-Policy strict-origin-when-cross-origin always;
    }
  }
}